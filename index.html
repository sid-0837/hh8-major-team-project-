<!DOCTYPE html>
<html>
<head>
    <title>AI-SIEM Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 90%;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        th {
            background: #020617;
        }

        tr:hover {
            background: #334155;
        }

        .high { color: red; font-weight: bold; }
        .medium { color: orange; }
        .low { color: lightgreen; }
        .critical { color: #ff4d4d; font-weight: bold; }

        canvas {
            background: white;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>🚨 AI-Based SIEM Dashboard</h1>

<div class="container">

    <!-- TABLE -->
    <h2>⚠️ Alerts</h2>
    <table>
        <thead>
            <tr>
                <th>IP Address</th>
                <th>Attack Type</th>
                <th>Severity</th>
                <th>Risk Score</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <!-- GRAPH -->
    <h2>📈 Risk Trend</h2>
    <canvas id="chart" width="600" height="250"></canvas>

</div>

<script>
const API = "http://127.0.0.1:8000";

let chart;

// Load Alerts Table
async function loadTable() {
    const res = await fetch(API + "/alerts");
    const data = await res.json();

    const table = document.getElementById("tableBody");
    table.innerHTML = "";

    if (data.length === 0) {
        table.innerHTML = "<tr><td colspan='4'>No alerts found</td></tr>";
        return;
    }

    data.forEach(a => {
        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${a.source_ip}</td>
            <td>${a.alert_type}</td>
            <td class="${a.severity.toLowerCase()}">${a.severity}</td>
            <td>${a.risk_score}</td>
        `;

        table.appendChild(row);
    });
}

// Load Graph
async function loadGraph() {
    const res = await fetch(API + "/risk-trend");
    const data = await res.json();

    const labels = data.map(d => d.time);
    const values = data.map(d => d.risk);

    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Risk Score",
                data: values,
                borderWidth: 2
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
}

// Refresh
function loadAll() {
    loadTable();
    loadGraph();
}

setInterval(loadAll, 3000);
loadAll();
</script>

</body>
</html>
