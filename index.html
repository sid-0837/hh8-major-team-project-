<!DOCTYPE html>
<html>

<head>
<title>AI-SIEM SOC Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

h1{
margin-bottom:30px;
}

.container{
display:flex;
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:220px;
text-align:center;
}

.section{
margin-top:40px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid gray;
}

.high{
color:red;
font-weight:bold;
}

.medium{
color:orange;
font-weight:bold;
}

.low{
color:lightgreen;
font-weight:bold;
}

</style>

</head>

<body>

<h1>AI-SIEM Security Operations Dashboard</h1>

<div class="container">

<div class="card">
<h3>Total Logs</h3>
<p id="logs">0</p>
</div>

<div class="card">
<h3>Total Alerts</h3>
<p id="alerts">0</p>
</div>

<div class="card">
<h3>Top Attacker</h3>
<p id="attacker">-</p>
</div>

</div>

<div class="section">

<h2>Attack Activity Timeline</h2>
<canvas id="timelineChart"></canvas>

</div>

<div class="section">

<h2>Security Alerts</h2>

<table>

<thead>
<tr>
<th>IP Address</th>
<th>Alert Type</th>
<th>Severity</th>
<th>Risk Score</th>
</tr>
</thead>

<tbody id="alertTable"></tbody>

</table>

</div>

<div class="section">

<h2>Recent Logs</h2>

<table>

<thead>
<tr>
<th>Time</th>
<th>Source IP</th>
<th>User</th>
<th>Status</th>
</tr>
</thead>

<tbody id="logTable"></tbody>

</table>

</div>

<script>

let timelineChart;

async function loadStats(){

const res = await fetch("http://127.0.0.1:8000/stats");
const data = await res.json();

document.getElementById("logs").innerText=data.total_logs;
document.getElementById("alerts").innerText=data.total_alerts;

}

async function loadAlerts(){

const res = await fetch("http://127.0.0.1:8000/alerts");
const alerts = await res.json();

let table="";
let attackerCount={};

alerts.forEach(a=>{

let severityClass="low";

if(a.severity=="High") severityClass="high";
if(a.severity=="Medium") severityClass="medium";

table+=`
<tr>
<td>${a.source_ip}</td>
<td>${a.alert_type}</td>
<td class="${severityClass}">${a.severity}</td>
<td>${a.risk_score}</td>
</tr>
`;

if(attackerCount[a.source_ip]){
attackerCount[a.source_ip]++
}else{
attackerCount[a.source_ip]=1
}

})

document.getElementById("alertTable").innerHTML=table;

let topIP="-";
let max=0;

for(let ip in attackerCount){

if(attackerCount[ip]>max){
max=attackerCount[ip]
topIP=ip
}

}

document.getElementById("attacker").innerText=topIP;

updateTimeline(alerts.length);

}

async function loadLogs(){

const res = await fetch("http://127.0.0.1:8000/logs");
const logs = await res.json();

let table="";

logs.forEach(l=>{

table+=`
<tr>
<td>${l.timestamp}</td>
<td>${l.source_ip}</td>
<td>${l.user}</td>
<td>${l.status}</td>
</tr>
`;

})

document.getElementById("logTable").innerHTML=table;

}

function updateTimeline(alertCount){

if(!timelineChart){

timelineChart=new Chart(document.getElementById("timelineChart"),{

type:"line",

data:{
labels:["Attacks"],
datasets:[{
label:"Detected Attacks",
data:[alertCount]
}]
}

});

}else{

timelineChart.data.datasets[0].data=[alertCount];
timelineChart.update();

}

}

loadStats();
loadAlerts();
loadLogs();

setInterval(()=>{

loadStats();
loadAlerts();
loadLogs();

},3000)

</script>

</body>

</html>
